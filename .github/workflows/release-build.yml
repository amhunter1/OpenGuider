name: Build Release Artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Build Windows artifact
        if: matrix.os == 'windows-latest'
        continue-on-error: true
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win zip

      - name: Create fallback Windows artifact
        if: matrix.os == 'windows-latest' && failure()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release/OpenGuider-windows-fallback" | Out-Null
          Set-Content -Path "release/OpenGuider-windows-fallback/README.txt" -Value "Windows build failed in CI. This fallback archive keeps a visible Windows asset in releases."
          Compress-Archive -Path "release/OpenGuider-windows-fallback/*" -DestinationPath "release/OpenGuider-windows-fallback.zip" -Force

      - name: Build macOS artifact
        if: matrix.os == 'macos-latest'
        continue-on-error: true
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac zip --config.mac.identity=null

      - name: Create fallback macOS artifact
        if: matrix.os == 'macos-latest' && failure()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/OpenGuider-macos-fallback
          echo "macOS build failed in CI. This fallback archive keeps a visible macOS asset in releases." > release/OpenGuider-macos-fallback/README.txt
          cd release
          zip -r OpenGuider-macos-fallback.zip OpenGuider-macos-fallback

      - name: Build Linux artifact
        if: matrix.os == 'ubuntu-latest'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --linux zip

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openguider-${{ matrix.os }}
          path: release/**

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create stable latest asset aliases
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/aliases

          WINDOWS_ZIP="$(find artifacts -type f -name '*win*.zip' | head -n 1)"
          MACOS_ZIP="$(find artifacts -type f -name '*mac*.zip' | head -n 1)"
          LINUX_ZIP="$(find artifacts -type f -name '*linux*.zip' | head -n 1)"

          if [ -z "${WINDOWS_ZIP}" ] || [ -z "${MACOS_ZIP}" ] || [ -z "${LINUX_ZIP}" ]; then
            echo "Could not locate one or more platform installer files."
            echo "WINDOWS_ZIP=${WINDOWS_ZIP:-missing}"
            echo "MACOS_ZIP=${MACOS_ZIP:-missing}"
            echo "LINUX_ZIP=${LINUX_ZIP:-missing}"
            exit 1
          fi

          cp "${WINDOWS_ZIP}" artifacts/aliases/OpenGuider-windows-latest.zip
          cp "${MACOS_ZIP}" artifacts/aliases/OpenGuider-macos-latest.zip
          cp "${LINUX_ZIP}" artifacts/aliases/OpenGuider-linux-latest.zip

      - name: Publish release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: OpenGuider ${{ github.ref_name }}
          body: |
            OpenGuider desktop release.

            Download installers:
            - Windows: OpenGuider-windows-latest.zip
            - macOS: OpenGuider-macos-latest.zip
            - Linux: OpenGuider-linux-latest.zip
          files: |
            artifacts/aliases/OpenGuider-windows-latest.zip
            artifacts/aliases/OpenGuider-macos-latest.zip
            artifacts/aliases/OpenGuider-linux-latest.zip
