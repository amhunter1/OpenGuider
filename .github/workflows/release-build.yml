name: Build Release Artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win nsis

      - name: Create fallback Windows installer
        if: matrix.os == 'windows-latest' && failure()
        shell: pwsh
        run: |
          throw "Windows NSIS installer build failed."

      - name: Build macOS installers
        if: matrix.os == 'macos-latest'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac dmg pkg --config.mac.identity=null

      - name: Create fallback macOS installer
        if: matrix.os == 'macos-latest' && failure()
        shell: bash
        run: |
          set -euo pipefail
          echo "macOS installer build failed."
          exit 1

      - name: Build Linux artifact
        if: matrix.os == 'ubuntu-latest'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --linux zip

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openguider-${{ matrix.os }}
          path: release/**

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create stable latest asset aliases
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/aliases

          WINDOWS_SETUP="$(find artifacts -type f -name '*.exe' | head -n 1)"
          MACOS_DMG="$(find artifacts -type f -name '*.dmg' | head -n 1)"
          MACOS_PKG="$(find artifacts -type f -name '*.pkg' | head -n 1)"
          LINUX_ZIP="$(find artifacts -type f -name '*linux*.zip' | head -n 1)"

          if [ -z "${WINDOWS_SETUP}" ] || [ -z "${MACOS_DMG}" ] || [ -z "${MACOS_PKG}" ] || [ -z "${LINUX_ZIP}" ]; then
            echo "Could not locate one or more platform installer files."
            echo "WINDOWS_SETUP=${WINDOWS_SETUP:-missing}"
            echo "MACOS_DMG=${MACOS_DMG:-missing}"
            echo "MACOS_PKG=${MACOS_PKG:-missing}"
            echo "LINUX_ZIP=${LINUX_ZIP:-missing}"
            exit 1
          fi

          cp "${WINDOWS_SETUP}" artifacts/aliases/OpenGuider-windows-setup-latest.exe
          cp "${MACOS_DMG}" artifacts/aliases/OpenGuider-macos-installer-latest.dmg
          cp "${MACOS_PKG}" artifacts/aliases/OpenGuider-macos-package-latest.pkg
          cp "${LINUX_ZIP}" artifacts/aliases/OpenGuider-linux-latest.zip

      - name: Publish release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: OpenGuider ${{ github.ref_name }}
          body: |
            OpenGuider desktop release.

            Download installers:
            - Windows setup: OpenGuider-windows-setup-latest.exe
            - macOS installer (DMG): OpenGuider-macos-installer-latest.dmg
            - macOS package (PKG): OpenGuider-macos-package-latest.pkg
            - Linux: OpenGuider-linux-latest.zip
          files: |
            artifacts/aliases/OpenGuider-windows-setup-latest.exe
            artifacts/aliases/OpenGuider-macos-installer-latest.dmg
            artifacts/aliases/OpenGuider-macos-package-latest.pkg
            artifacts/aliases/OpenGuider-linux-latest.zip
